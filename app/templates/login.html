{% extends 'base.html' %}

{% block title %}Login | Futsal Management System{% endblock %}

{% block content %}
<div style="max-width: 450px; margin: 4rem auto;">
    <div class="glass-panel">
        <h2 style="text-align: center; margin-bottom: 2rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
            <i class="fas fa-sign-in-alt text-primary"></i> Login to Futsal Hub
        </h2>
        
        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Enter your username" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <label style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; cursor: pointer; color: var(--text-secondary);">
                    <input type="checkbox" name="remember" style="accent-color: var(--primary);"> Remember Me
                </label>
                <a href="#" style="font-size: 0.85rem; color: var(--secondary);">Forgot Password?</a>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>
        
        <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-secondary);">
            Don't have an account? <a href="{{ url_for('auth.register') }}" style="color: var(--primary); font-weight: 600;">Register here</a>
        </div>
    </div>
</div>
{% endblock %}
